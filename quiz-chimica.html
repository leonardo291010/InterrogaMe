<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Quiz Chimica - InterrogaMe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f5f5f5;
    padding: 15px;
  }

  button, select {
    width: 100%;
    max-width: 400px;
    padding: 12px;
    margin: 10px auto;
    font-size: 16px;
    border-radius: 10px;
    border: none;
  }

  button {
    background: #4CAF50;
    color: white;
  }
</style>

</head>

<body>

<h1>SEI PRONTO??? ⚛️</h1>

<p>Quiz di Chimica</p>

<select id="difficolta">
  <option value="">Scegli difficoltà</option>
  <option value="facile">Facile</option>
  <option value="normale">Normale</option>
  <option value="difficile">Difficile</option>
</select>

<button onclick="mostraDomande()">Inizia</button>

<div id="domande"></div>

<script>
function mostraDomande() {
  let scelta = document.getElementById("difficolta").value;
  let box = document.getElementById("domande");

  if (scelta === "facile") {
    box.innerHTML = `
      <p>Che cosa studia la chimica?</p>
      <p>Qual è la particella più piccola che mantiene le proprietà di un elemento?</p>
      <p>Come si chiama la sostanza fatta da un solo tipo di atomi?</p>
      <p>L’acqua è un elemento o un composto?</p>
      <p>Qual è il simbolo chimico dell’ossigeno?</p>
    `;
  }
  if (scelta === "normale") {
    box.innerHTML = `
      <p>Da quali particelle è formato un atomo?</p>
      <p>Dove si trovano protoni e neutroni nell’atomo?</p>
      <p>Che cos’è una molecola?</p>
      <p>Qual è la differenza tra elemento e composto?</p>
      <p>Che cos’è una reazione chimica?</p>
    `;
  }

  if (scelta === "difficile") {
    box.innerHTML = `
      <p>Che cos’è il numero atomico e cosa indica?</p>
      <p>Che differenza c’è tra massa atomica e numero di massa?</p>
      <p>Che cos’è un legame chimico?</p>
      <p>Qual è la differenza tra trasformazione fisica e chimica?</p>
      <p>Che cosa afferma la legge di conservazione della massa?</p>
    `;
  }
}
</script>

<br><br>
<button onclick="location.href='index.html'">⬅ Torna alla home</button>

</body>
</html>
