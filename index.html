<!DOCTYPE html>
<html lang="it">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<meta name="description" content="Generatore di interrogazioni automatico per scuola. Allenati con delle domande per qualsiasi materiaprima dell'interrogazione per verificare di aver studiato nella materia corretta">
<title>InterrogaMe-generatore di interrogazioni online</title>
<link rel="icon" type="image/png" href"iconasito.png">
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 15px;
    text-align: center;
    background: #f5f5f5;
  }

  h1 {
    font-size: 24px;
  }

  button {
    display: block;
    width: 90%;
    max-width: 400px;
    margin: 10px auto;
    padding: 15px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    background: #4CAF50;
    color: white;
  }

  select {
    width: 90%;
    max-width: 400px;
    padding: 10px;
    margin: 10px auto;
    font-size: 16px;
  }

  hr {
    margin: 20px 0;
  }
</style>
</head>

<body>

<h1>InterrogaMe</h1>

<label>Tipo argomento</label>
<select id="tipo" onchange="controllaTipo()">
    <option value="">Seleziona tipo</option>
    <option value="persona">Persona</option>
    <option value="paese">Paese</option>
    <option value="oggetto">Oggetto</option>
    <option value="periodo">Periodo</option>
    <option value="evento">Evento</option>
</select>

<div id="materiaBox">
    <label>Materia</label>
    <select id="materia">
        <option value="">Seleziona materia</option>
        <option value="storia">Storia</option>
        <option value="geografia">Geografia</option>
        <option value="scienze">Scienze</option>
    </select>
</div>

<input type="text" id="argomento" placeholder="Scrivi argomento (es: Napoleone, Italia, Medioevo)">

<button onclick="genera()">Genera domande</button>

<div id="output"></div>

<script>
function controllaTipo() {
    const tipo = document.getElementById("tipo").value;
    const box = document.getElementById("materiaBox");

    box.style.display = (tipo === "paese") ? "block" : "none";
}

function genera() {
    const tipo = document.getElementById("tipo").value;
    const arg = document.getElementById("argomento").value.trim();
    const materia = document.getElementById("materia").value;

    let domande = [];
    
    if (!tipo) {
        mostra("Seleziona un tipo!");
        return;
    }

    if (!arg) {
        mostra("Scrivi un argomento valido!");
        return;
    }

    if (tipo === "paese" && !materia) {
        mostra("Seleziona la materia!");
        return;
    }
    if (tipo === "persona") {
        domande = [
            `Chi è ${arg}?`,
            `Quando è nato e quando è morto ${arg}?`,
            `Cosa ha fatto di importante ${arg}?`,
            `Perché ${arg} è considerato importante?`
        ];
    }
    else if (tipo === "paese") {

        if (materia === "storia") {
            domande = [
                `Quali eventi storici importanti riguardano ${arg}?`,
                `Come si è sviluppato storicamente ${arg}?`,
                `Quali guerre o rivoluzioni hanno coinvolto ${arg}?`
            ];
        }

        else if (materia === "geografia") {
            domande = [
                `Dove si trova ${arg} e quali sono i suoi confini?`,
                `Quali sono le principali caratteristiche geografiche di ${arg}?`,
                `Quali sono le attività economiche principali di ${arg}?`
            ];
        }

        else if (materia === "scienze") {
            domande = [
                `Quali scoperte scientifiche importanti sono state fatte in ${arg}?`,
                `Quali risorse naturali ha ${arg}?`,
                `Che tipo di ambiente e biodiversità ha ${arg}?`
            ];
        }
    }
    else if (tipo === "oggetto") {
        domande = [
            `Cos'è ${arg} e a cosa serve?`,
            `Come funziona ${arg}?`,
            `Come è stato inventato o scoperto ${arg}?`,
            `Quali problemi risolve ${arg}?`
        ];
    }
    else if (tipo === "periodo") {
        domande = [
            `Cos'è il periodo del ${arg}?`,
            `Quali sono le caratteristiche principali del ${arg}?`,
            `Quali eventi importanti avvengono nel ${arg}?`,
            `Come si viveva nel ${arg}?`,
            `Perché il ${arg} è importante nella storia?`
        ];
    }
    else if (tipo === "evento") {
        domande = [
            `Quando è avvenuto ${arg}?`,
            `Quali sono le cause di ${arg}?`,
            `Chi sono i protagonisti di ${arg}?`,
            `Quali sono le conseguenze di ${arg}?`,
            `Perché ${arg} è importante nella storia?`
        ];
    }

    document.getElementById("output").innerHTML =
        domande.map(d => `<p>• ${d}</p>`).join("");
}

// funzione per mostrare errori
function mostra(testo) {
    document.getElementById("output").innerHTML = `<p>${testo}</p>`;
}
</script>
<br>

    </button>

</a>

</a>
</body>
</html>
