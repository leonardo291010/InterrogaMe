<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Quiz Inglese</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <meta name="description" content="Quiz sulla conoscenza linguistica dell'inglese. quiz a punti diviso in difficoltà che copre sia traduzioni che grammatica">
</head>

<body style="font-family: Arial; text-align:center; padding:15px;">

<button id="homeBtn" style="
  position:fixed;
  top:10px;
  left:10px;
  z-index:10;
  padding:10px 15px;
  border-radius:8px;
  background:#333;
  color:white;
  border:none;
">
⬅ Home
</button>

<h1>📖 Quiz Inglese</h1>

<select id="difficolta">
  <option value="">Scegli difficoltà</option>
  <option value="facile">Facile</option>
  <option value="normale">Normale</option>
  <option value="difficile">Difficile</option>
</select>

<button id="startBtn">Inizia</button>

<div id="quiz"></div>
<h2 id="risultato"></h2>

<script>
const quiz = {
  facile: [
    { q: "Cosa significa i am", opzioni: ["io ero","io sono","io sarò"], giusta: 1 },
    { q: "come si dice libro in inglese?", opzioni: ["page","library","book"], giusta: 2 },
    { q: "she is happy significa?", opzioni: ["lui è felice","lei è felice","lui sarà felice"], giusta: 1 },
    { q: "plurale di child?", opzioni: ["children","childes","childs"], giusta: 0 },
    { q: "dog significa?", opzioni: ["gatto","cane","animale"], giusta: 1 }
  ],
  normale: [
    { q: "differenza tra can e could?", opzioni: ["can passato","nessuna","could passato"], giusta: 2 },
    { q: "may e might servono per?", opzioni: ["dovere","certezza","possibilità"], giusta: 2 },
    { q: "sto studiando inglese:", opzioni: ["i am studying english","i will study english","i am study english"], giusta: 0 },
    { q: "he doesn't like pizza?", opzioni: ["ama pizza","non ama pizza","mangia pizza"], giusta: 1 },
    { q: "passato di go?", opzioni: ["goed","went","gone"], giusta: 1 }
  ],
  difficile: [
    { q: "will vs going to?", opzioni: ["uguali","going passato","will improvvisa"], giusta: 2 },
    { q: "third conditional?", opzioni: ["if i had studied...","second","first"], giusta: 0 },
    { q: "avrei voluto venire?", opzioni: ["i would have liked to come","i wanted","i would like"], giusta: 0 },
    { q: "possibilità futuro?", opzioni: ["must","might","went"], giusta: 1 },
    { q: "say vs tell?", opzioni: ["say passato","uguali","tell ha destinatario"], giusta: 2 }
  ]
};
</script>

<h2>Obiettivo quiz</h2>
<p>l'obiettivo di questo quiz è testare la conoscenza dell'inglese con domande che riguardano grammatica e traduzioni</p>
<p>le domande sono divise in difficoltà per garantire uno studio per qualsiasi età e classe.</p>

<script src="quiz.js" defer></script>

<script>
document.getElementById("homeBtn").onclick = () => {
  location.href = "index.html";
};
</script>

</body>
</html>
