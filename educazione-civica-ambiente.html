<h1>Quiz Educazione Civica 🌍</h1>

<p>Ambiente, inquinamento ed effetto serra</p>

<select id="difficolta">
  <option value="">Scegli difficoltà</option>
  <option value="facile">Facile</option>
  <option value="normale">Normale</option>
  <option value="difficile">Difficile</option>
</select>

<button onclick="mostraDomande()">Inizia</button>

<div id="quiz"></div>
<h2 id="risultato"></h2>

<script>
const quiz = {
  facile: [
    {
      q: "Che cos’è l’inquinamento?",
      opzioni: [
        "L’aumento della biodiversità",
        "La presenza di sostanze nocive nell’ambiente",
        "Il raffreddamento dell’atmosfera"
      ],
      giusta: 1
    },
    {
      q: "Qual è una fonte di inquinamento dell’aria?",
      opzioni: [
        "Le auto a combustione",
        "Le rocce naturali",
        "I vulcani spenti"
      ],
      giusta: 0
    }
  ],

  normale: [
    {
      q: "Che cos’è l’effetto serra?",
      opzioni: [
        "Raffreddamento della Terra",
        "Trattenimento del calore nell’atmosfera",
        "Distruzione dell’ozono"
      ],
      giusta: 1
    },
    {
      q: "Quale gas contribuisce all’effetto serra?",
      opzioni: [
        "Anidride carbonica",
        "Elio",
        "Neon"
      ],
      giusta: 0
    }
  ],

  difficile: [
    {
      q: "Differenza tra effetto serra naturale e intensificato?",
      opzioni: [
        "Sono identici",
        "Naturale utile, intensificato causato dall’uomo",
        "Naturale causato dall’inquinamento"
      ],
      giusta: 1
    },
    {
      q: "Perché i CFC sono stati vietati?",
      opzioni: [
        "Perché migliorano l’ozono",
        "Perché distruggono lo strato di ozono",
        "Perché aumentano l’ossigeno"
      ],
      giusta: 1
    }
  ]
};

let livello = "";
let index = 0;
let punti = 0;

function mostraDomande() {
  livello = document.getElementById("difficolta").value;

  if (!livello) return alert("Scegli difficoltà!");

  index = 0;
  punti = 0;

  mostra();
}

function mostra() {
  const q = quiz[livello][index];

  document.getElementById("quiz").innerHTML = `
    <h3>${q.q}</h3>
    ${q.opzioni.map((op, i) =>
      `<button onclick="rispondi(${i})">${op}</button>`
    ).join("")}
  `;
}

function rispondi(i) {
  if (i === quiz[livello][index].giusta) {
    punti++;
  }

  index++;

  if (index < quiz[livello].length) {
    mostra();
  } else {
    mostraRisultato();
  }
}

function mostraRisultato() {
  let totale = quiz[livello].length;

  let percentuale = (punti / totale) * 100;
  let voto = (percentuale / 10).toFixed(1);

  document.getElementById("quiz").innerHTML = "";

  document.getElementById("risultato").innerHTML = `
    📊 Risultato: ${punti}/${totale}<br>
    📈 Percentuale: ${percentuale.toFixed(0)}%<br>
    🎓 Voto: ${voto}
  `;
}
</script>
