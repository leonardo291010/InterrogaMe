<h1>Quiz Educazione Civica 🌍</h1>

<p>Ambiente, inquinamento ed effetto serra</p>

<select id="difficolta">
  <option value="">Scegli difficoltà</option>
  <option value="facile">Facile</option>
  <option value="normale">Normale</option>
  <option value="difficile">Difficile</option>
</select>

<button onclick="mostraDomande()">Inizia</button>

<div id="domande"></div>

<script>
function mostraDomande() {
  let scelta = document.getElementById("difficolta").value;
  let box = document.getElementById("domande");

  if (scelta === "facile") {
    box.innerHTML = `
      <p>Che cos’è l’inquinamento?</p>
      <p>Qual è un esempio di fonte di inquinamento dell’aria?</p>
      <p>Che cos’è l’atmosfera?</p>
      <p>È meglio buttare i rifiuti per terra o negli appositi contenitori?</p>
      <p>Che cosa significa “riciclo”?</p>
    `;
  }

  if (scelta === "normale") {
    box.innerHTML = `
      <p>Che cos’è l’effetto serra?</p>
      <p>Quali gas sono responsabili dell’effetto serra? (almeno uno)</p>
      <p>Che cos’è il buco dell’ozono?</p>
      <p>Perché il buco dell’ozono è pericoloso?</p>
      <p>Quali sono le principali conseguenze dell’inquinamento atmosferico?</p>
    `;
  }

  if (scelta === "difficile") {
    box.innerHTML = `
      <p>Qual è la differenza tra effetto serra naturale e effetto serra intensificato dall’uomo?</p>
      <p>Che ruolo ha l’anidride carbonica nel riscaldamento globale?</p>
      <p>Come si formano i gas serra nell’atmosfera?</p>
      <p>Perché i CFC sono stati vietati in molti paesi?</p>
      <p>Qual è la differenza tra cambiamento climatico e riscaldamento globale?</p>
    `;
  }
}

function apriMenu() {
  document.getElementById("menu").style.width = "250px";
  document.getElementById("overlay").style.display = "block";
}

function chiudiMenu() {
  document.getElementById("menu").style.width = "0";
  document.getElementById("overlay").style.display = "none";
}
</script>
