<h1>SEI PRONTO???</h1>

<label>Scegli difficoltà:</label>
<select id="difficolta">
  <option value="facile">Facile</option>
  <option value="normale">Normale</option>
  <option value="difficile">Difficile</option>
</select>

<br><br>

<button onclick="iniziaQuiz()">Inizia interrogazione</button>

<hr>

<div id="quiz"></div>

<script>
const domande = {
  facile: [
    "Qual è la capitale d’Italia?",
    "Quante regioni ha l’Italia?",
    "Qual è il mare che bagna la costa ovest?",
    "In che continente si trova l’Italia?",
    "Qual è il nome della forma geografica dell’Italia?"
  ],

  normale: [
    "Quali sono le 5 regioni a statuto speciale?",
    "Qual è il fiume più lungo d’Italia?",
    "Qual è la montagna più alta d’Italia?",
    "In che anno l’Italia è diventata una Repubblica?",
    "Quali sono le tre grandi isole italiane?"
  ],

  difficile: [
    "Qual è la regione italiana con più comuni?",
    "Qual è il punto più a nord dell’Italia?",
    "Quale città è stata capitale d’Italia prima di Roma?",
    "Qual è la differenza tra Appennini settentrionali e centrali?",
    "Qual è il nome del passo alpino più alto utilizzato come confine naturale?"
  ]
};

function iniziaQuiz() {
  const diff = document.getElementById("difficolta").value;
  const lista = domande[diff];

  let html = "<h2>Domande:</h2><ol>";

  for (let q of lista) {
    html += "<li>" + q + "</li>";
  }

  html += "</ol>";

  document.getElementById("quiz").innerHTML = html;
}
</script>
  
<script>
function apriMenu() {
  document.getElementById("menu").style.width = "250px";
  document.getElementById("overlay").style.display = "block";
}

function chiudiMenu() {
  document.getElementById("menu").style.width = "0";
  document.getElementById("overlay").style.display = "none";
}
</script>
